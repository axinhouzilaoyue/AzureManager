<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azure Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf9f5; --bg2: #f0eee8; --bg3: #e8e5de;
      --border: #e3e1db; --text: #2d2a26; --text2: #6d6760;
      --primary: #8b8680; --primary-hover: #7f7a74;
      --success: #10b981; --error: #c65746; --warning: #f59e0b;
      --sidebar-w: 240px; --radius: 8px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

    /* login */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; width: 360px; }
    .login-card h1 { font-size: 20px; margin-bottom: 8px; }
    .login-card p { color: var(--text2); margin-bottom: 24px; font-size: 13px; }

    /* layout */
    #app { display: none; }
    .layout { display: flex; min-height: 100vh; }

    /* sidebar */
    .sidebar { width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; }
    .sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); }
    .sidebar-header h2 { font-size: 15px; font-weight: 600; }
    .sidebar-header p { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .sidebar-section { padding: 12px 8px; border-bottom: 1px solid var(--border); flex: 1; overflow-y: auto; }
    .sidebar-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; padding: 0 8px; margin-bottom: 4px; }
    .account-item { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 6px; cursor: pointer; transition: background 0.15s; font-size: 13px; }
    .account-item:hover { background: var(--bg3); }
    .account-item.active { background: var(--bg3); font-weight: 500; }
    .account-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .account-dot.ok { background: var(--success); }
    .sidebar-footer { padding: 12px 8px; display: flex; flex-direction: column; gap: 8px; }

    /* main */
    .main { margin-left: var(--sidebar-w); flex: 1; padding: 24px; }
    .main-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .main-header h1 { font-size: 18px; font-weight: 600; }

    /* tabs */
    .tabs { display: flex; gap: 2px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
    .tab { padding: 8px 16px; cursor: pointer; color: var(--text2); font-size: 13px; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--primary); font-weight: 500; }

    /* table */
    .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; background: var(--bg3); border-bottom: 1px solid var(--border); }
    td { padding: 10px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(0,0,0,0.015); }

    /* badges */
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
    .badge-success { background: #d1fae5; color: #065f46; }
    .badge-error { background: #fee2e2; color: #991b1b; }
    .badge-running { background: #dbeafe; color: #1e40af; }
    .badge-info { background: var(--bg3); color: var(--text2); }

    /* buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg2); color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: inherit; white-space: nowrap; line-height: 1; }
    .btn:hover { background: var(--bg3); }
    .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    .btn-danger { color: var(--error); border-color: #fca5a5; }
    .btn-danger:hover { background: #fee2e2; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-group { display: flex; gap: 4px; flex-wrap: wrap; }

    /* forms */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    input, select, textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit; transition: border-color 0.15s; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); }
    textarea { resize: vertical; min-height: 80px; }
    .form-hint { font-size: 12px; color: var(--text2); margin-top: 4px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 24px; }
    .modal { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
    .modal-lg { max-width: 560px; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .modal-header h3 { font-size: 15px; font-weight: 600; }
    .modal-body { padding: 20px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 16px 20px; border-top: 1px solid var(--border); }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text2); padding: 2px 6px; line-height: 1; border-radius: 4px; }
    .modal-close:hover { background: var(--bg3); }

    /* toast */
    #toast-container { position: fixed; top: 16px; right: 16px; z-index: 200; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); max-width: 320px; animation: toast-in 0.2s ease; pointer-events: auto; }
    .toast-success { border-left: 3px solid var(--success); }
    .toast-error { border-left: 3px solid var(--error); }
    @keyframes toast-in { from { transform: translateX(16px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* task log */
    .log-list { display: flex; flex-direction: column; gap: 3px; }
    .log-item { display: grid; grid-template-columns: 60px 90px 1fr; gap: 8px; font-size: 12px; font-family: monospace; padding: 5px 8px; border-radius: 4px; background: var(--bg2); }
    .log-item.error { background: #fee2e2; }
    .log-time { color: var(--text2); }
    .log-step { color: var(--primary); }

    /* misc */
    .empty { text-align: center; padding: 48px 24px; color: var(--text2); font-size: 13px; }
    .no-account { display: flex; align-items: center; justify-content: center; min-height: 300px; color: var(--text2); font-size: 14px; }
    .check-result { padding: 10px 12px; border-radius: 6px; font-size: 13px; margin-top: 8px; }
    .check-result.ok { background: #d1fae5; color: #065f46; }
    .check-result.fail { background: #fee2e2; color: #991b1b; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="toast-container"></div>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>Azure Manager</h1>
    <p>输入访问密码登录</p>
    <div class="form-group">
      <label for="login-password">密码</label>
      <input type="password" id="login-password" placeholder="访问密码" autocomplete="current-password" />
    </div>
    <button class="btn btn-primary" style="width:100%" id="login-btn">登录</button>
    <div id="login-error" class="hidden" style="margin-top:12px;color:var(--error);font-size:13px;"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Azure Manager</h2>
        <p id="sidebar-subtitle">加载中...</p>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Azure 账户</div>
        <div id="account-list"></div>
      </div>
      <div class="sidebar-footer">
        <button class="btn btn-sm" id="btn-add-account">+ 添加账户</button>
        <button class="btn btn-sm" id="btn-logout">退出登录</button>
      </div>
    </aside>

    <main class="main">
      <div id="view-no-account">
        <div class="main-header"><h1>Azure Manager</h1></div>
        <div class="no-account">请从左侧选择一个 Azure 账户</div>
      </div>

      <div id="view-account" class="hidden">
        <div class="main-header">
          <h1 id="account-title">-</h1>
          <div class="btn-group">
            <button class="btn btn-sm" id="btn-refresh">刷新</button>
            <button class="btn btn-sm" id="btn-create-vm">创建虚拟机</button>
            <button class="btn btn-sm" id="btn-edit-account">编辑</button>
            <button class="btn btn-sm btn-danger" id="btn-delete-account">删除账户</button>
          </div>
        </div>

        <div class="tabs">
          <div class="tab active" data-tab="vms">虚拟机</div>
          <div class="tab" data-tab="tasks">任务</div>
          <div class="tab" data-tab="settings">设置</div>
        </div>

        <div id="tab-vms">
          <div class="table-wrap">
            <table><thead><tr><th>名称</th><th>资源组</th><th>区域</th><th>大小</th><th>状态</th><th>公网 IP</th><th>操作</th></tr></thead>
            <tbody id="vm-tbody"></tbody></table>
          </div>
        </div>

        <div id="tab-tasks" class="hidden">
          <div id="task-list"></div>
        </div>

        <div id="tab-settings" class="hidden">
          <div style="max-width:600px">
            <div class="form-group">
              <label>全局开机脚本（User Data）</label>
              <textarea id="startup-script" rows="12" style="font-family:monospace;font-size:12px"></textarea>
              <div class="form-hint">创建虚拟机时默认使用此脚本，可在创建时覆盖</div>
            </div>
            <button class="btn btn-primary" id="btn-save-script">保存脚本</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Modal: 添加/编辑账户 -->
<div id="modal-account" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-account-title">添加 Azure 账户</h3>
      <button class="modal-close" data-close="modal-account">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="account-edit-id" />
      <div class="form-group"><label>账户名称</label><input type="text" id="account-name" /></div>
      <div id="account-creds">
        <div class="form-group"><label>Client ID</label><input type="text" id="account-client-id" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" /></div>
        <div class="form-group"><label>Client Secret</label><input type="password" id="account-client-secret" /></div>
        <div class="form-group"><label>Tenant ID</label><input type="text" id="account-tenant-id" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" /></div>
        <div class="form-group"><label>Subscription ID</label><input type="text" id="account-subscription-id" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" /></div>
      </div>
      <div class="form-group"><label>过期日期（可选）</label><input type="date" id="account-expiration" /></div>
      <div id="account-check-result" class="hidden check-result"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" data-close="modal-account">取消</button>
      <button class="btn" id="btn-check-creds" style="display:none">检查账户</button>
      <button class="btn btn-primary" id="btn-save-account">保存</button>
    </div>
  </div>
</div>

<!-- Modal: 创建 VM -->
<div id="modal-create-vm" class="modal-overlay hidden">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3>创建虚拟机</h3>
      <button class="modal-close" data-close="modal-create-vm">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>区域</label><select id="create-region"><option value="">加载中...</option></select></div>
        <div class="form-group"><label>实例类型</label>
          <select id="create-vm-size">
            <option value="Standard_B1s">Standard_B1s (1vCPU / 1GB)</option>
            <option value="Standard_B1ms">Standard_B1ms (1vCPU / 2GB)</option>
            <option value="Standard_B2s">Standard_B2s (2vCPU / 4GB)</option>
            <option value="Standard_B2ms">Standard_B2ms (2vCPU / 8GB)</option>
            <option value="Standard_D2s_v3">Standard_D2s_v3 (2vCPU / 8GB)</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>操作系统</label>
          <select id="create-os">
            <option value="debian12">Debian 12</option>
            <option value="debian11">Debian 11</option>
            <option value="ubuntu22">Ubuntu 22.04</option>
            <option value="ubuntu20">Ubuntu 20.04</option>
          </select>
        </div>
        <div class="form-group"><label>磁盘大小 (GB)</label><input type="number" id="create-disk" value="30" min="30" max="1024" /></div>
      </div>
      <div class="form-group"><label>公网 IP 类型</label>
        <select id="create-ip-type"><option value="Static">静态 (Static)</option><option value="Dynamic">动态 (Dynamic)</option></select>
      </div>
      <div class="form-group">
        <label>开机脚本（留空使用全局默认）</label>
        <textarea id="create-userdata" rows="5" style="font-family:monospace;font-size:12px" placeholder="#!/bin/bash"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" data-close="modal-create-vm">取消</button>
      <button class="btn btn-primary" id="btn-submit-create-vm">创建</button>
    </div>
  </div>
</div>

<!-- Modal: VM 操作确认 -->
<div id="modal-confirm" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3 id="confirm-title">确认操作</h3>
      <button class="modal-close" data-close="modal-confirm">×</button>
    </div>
    <div class="modal-body"><p id="confirm-desc" style="font-size:14px;line-height:1.6"></p></div>
    <div class="modal-footer">
      <button class="btn" data-close="modal-confirm">取消</button>
      <button class="btn btn-primary" id="btn-confirm">确认</button>
    </div>
  </div>
</div>

<!-- Modal: 任务详情 -->
<div id="modal-task" class="modal-overlay hidden">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3>任务详情</h3>
      <button class="modal-close" data-close="modal-task">×</button>
    </div>
    <div class="modal-body">
      <div id="task-info" style="margin-bottom:16px"></div>
      <div class="log-list" id="task-logs"></div>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
